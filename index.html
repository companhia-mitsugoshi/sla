<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companhia Mitsugoshi</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, ::before, ::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background-color: #050609;
      color: #ffffff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      margin: 0;
    }

    /* ── Glass ── */
    .glass-card {
      background: rgba(17,19,26,0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .glass-input {
      background: rgba(5,6,9,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(147,51,234,0.5); border-radius: 3px; }

    /* ── Colors ── */
    .color-heroi    { color: #facc15 !important; font-weight: 700; }
    .color-mitico   { color: #d946ef !important; font-weight: 700; }
    .color-lendario { color: #818cf8 !important; font-weight: 700; }
    .color-ativa    { color: #ef4444 !important; font-weight: 700; }
    .color-passiva  { color: #3b82f6 !important; font-weight: 700; }
    .neon-text { text-shadow: 0 0 8px #fff, 0 0 12px #9333ea, 0 0 24px #9333ea; color: #fff; }

    /* ── Header ── */
    header {
      padding: 1.2rem 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      position: sticky;
      top: 0;
      background: rgba(5,6,9,0.92);
      backdrop-filter: blur(16px);
      z-index: 40;
    }
    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .brand img { width: 44px; height: 44px; border-radius: 50%; border: 1px solid rgba(6,182,212,0.3); object-fit: cover; }
    .brand-name {
      font-size: 1.15rem;
      font-weight: 900;
      letter-spacing: -0.05em;
      background: linear-gradient(to right, #c084fc, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header-actions { display: flex; align-items: center; gap: 10px; }

    /* Category menu */
    #catMenu {
      display: none;
      position: absolute;
      right: 0;
      margin-top: 8px;
      width: 200px;
      border-radius: 14px;
      padding: 8px;
      z-index: 50;
      max-height: 280px;
      overflow-y: auto;
    }
    #catMenu.active { display: block; }
    #catMenu a {
      display: block;
      padding: 8px 14px;
      font-size: 0.75rem;
      font-weight: 700;
      color: #d1d5db;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.15s;
    }
    #catMenu a:hover { background: rgba(255,255,255,0.08); }

    /* Cart button */
    #cartBtn {
      padding: 8px 16px;
      border-radius: 9999px;
      background: rgba(255,255,255,0.05);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border 0.2s;
    }
    #cartBtn:hover { border-color: rgba(34,211,238,0.5); }

    /* ── Main ── */
    main { max-width: 1100px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }

    /* ── Ranking ── */
    .ranking-section { margin-bottom: 2.5rem; }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: #eab308;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ranking-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
    }
    @media (max-width: 640px) { .ranking-grid { grid-template-columns: repeat(3, 1fr); } }
    .rank-card {
      padding: 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 6px;
    }
    .rank-num { font-size: 1.3rem; font-weight: 900; }
    .rank-card img { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(255,255,255,0.1); }
    .rank-name { font-size: 0.65rem; font-weight: 700; }

    /* ── Search + Filter ── */
    #searchInput {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(5,6,9,0.8);
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border 0.2s;
      margin-bottom: 1rem;
    }
    #searchInput:focus { border-color: #22d3ee; }

    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 0.6rem;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 9999px;
      border: 1.5px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: #9ca3af;
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: all 0.2s;
    }
    .filter-btn:hover { background: rgba(255,255,255,0.09); }
    .filter-btn.on-todos    { background: rgba(147,51,234,0.22); border-color: #9333ea; color: #e9d5ff; }
    .filter-btn.on-heroi    { background: rgba(250,204,21,0.15);  border-color: #facc15; color: #facc15; }
    .filter-btn.on-mitico   { background: rgba(217,70,239,0.15);  border-color: #d946ef; color: #d946ef; }
    .filter-btn.on-lendario { background: rgba(129,140,248,0.15); border-color: #818cf8; color: #818cf8; }

    #filterCount { font-size: 0.68rem; color: #6b7280; margin-bottom: 1.5rem; min-height: 1em; }

    /* ── Catalog ── */
    #itemsContainer { display: flex; flex-direction: column; gap: 3rem; }

    .cat-section h2 {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
      color: #22d3ee;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .cat-section.all-hidden { display: none; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    /* ── Dragon Card ── */
    .dragon-card {
      border-radius: 20px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: border 0.2s, transform 0.2s;
    }
    .dragon-card:hover { border-color: rgba(147,51,234,0.35); transform: translateY(-2px); }
    .dragon-card.hidden-by-filter { display: none; }

    .card-img-wrap {
      position: relative;
      height: 155px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .card-img-wrap img {
      max-height: 100%;
      max-width: 100%;
      object-fit: contain;
      transition: transform 0.3s;
    }
    .dragon-card:hover .card-img-wrap img { transform: scale(1.06); }

    /* Raridade badge no card */
    .card-rarity-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 9999px;
    }
    .badge-heroi    { background: rgba(250,204,21,0.2);  color: #facc15; border: 1px solid rgba(250,204,21,0.4); }
    .badge-mitico   { background: rgba(217,70,239,0.2);  color: #d946ef; border: 1px solid rgba(217,70,239,0.4); }
    .badge-lendario { background: rgba(129,140,248,0.2); color: #818cf8; border: 1px solid rgba(129,140,248,0.4); }

    .card-name {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 0.72rem;
      color: #9ca3af;
      max-height: 90px;
      overflow-y: auto;
      line-height: 1.6;
      margin-bottom: 14px;
      padding-right: 4px;
      flex: 1;
    }

    /* Orbs select */
    .card-select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(5,6,9,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      outline: none;
      margin-bottom: 10px;
      transition: border 0.2s;
    }
    .card-select:focus { border-color: #9333ea; }
    .card-select option { background: #0d0e14; }

    /* Add button */
    .btn-add {
      width: 100%;
      padding: 10px;
      background: #7c3aed;
      border: none;
      border-radius: 10px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-add:hover { background: #8b5cf6; }
    .btn-add:active { transform: scale(0.98); }

    /* ── Empty state ── */
    .empty-catalog {
      text-align: center;
      padding: 80px 20px;
      color: #4b5563;
    }
    .empty-catalog i { font-size: 3rem; margin-bottom: 16px; display: block; }
    .empty-catalog h3 { font-size: 1rem; margin-bottom: 8px; color: #6b7280; }
    .empty-catalog p { font-size: 0.8rem; }
    .empty-catalog a {
      display: inline-block;
      margin-top: 16px;
      padding: 10px 20px;
      background: rgba(147,51,234,0.2);
      border: 1px solid rgba(147,51,234,0.4);
      color: #c084fc;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.2s;
    }
    .empty-catalog a:hover { background: rgba(147,51,234,0.35); }

    /* ── Checkout Modal ── */
    #checkoutModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #checkoutModal.open { display: flex; }
    .modal-box {
      background: #0d0e14;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 1rem; font-weight: 800; color: #c084fc; }
    .btn-close-modal {
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.2s;
    }
    .btn-close-modal:hover { color: #fff; }

    #cartList { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
    .cart-item {
      display: flex;
      gap: 12px;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px;
    }
    .cart-item img { width: 46px; height: 46px; object-fit: contain; border-radius: 8px; background: rgba(255,255,255,0.04); flex-shrink:0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 0.8rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-orbs { font-size: 0.7rem; color: #9ca3af; }
    .cart-item-price { font-size: 0.75rem; color: #4ade80; font-weight: 700; white-space: nowrap; }
    .btn-remove-item {
      background: none;
      border: none;
      color: #6b7280;
      cursor: pointer;
      font-size: 0.8rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .btn-remove-item:hover { color: #ef4444; }

    .modal-input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(5,6,9,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.82rem;
      margin-bottom: 10px;
      outline: none;
    }
    .modal-input:focus { border-color: #9333ea; }

    .bonus-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .btn-apply-bonus {
      padding: 10px 16px;
      background: rgba(147,51,234,0.2);
      border: 1px solid rgba(147,51,234,0.4);
      color: #c084fc;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-apply-bonus:hover { background: rgba(147,51,234,0.35); }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 14px;
    }
    .total-label { font-size: 0.82rem; color: #9ca3af; }
    #totalDisplay { font-size: 1.1rem; font-weight: 800; color: #4ade80; }

    .essence-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 0.78rem;
      color: #9ca3af;
    }
    .essence-row span:last-child { color: #facc15; font-weight: 700; }

    .pull-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.25);
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .pull-toggle-label { font-size: 0.8rem; color: #e5e7eb; font-weight: 600; }
    .pull-toggle-sub { font-size: 0.66rem; color: #9ca3af; margin-top: 2px; }
    .pull-toggle-switch {
      position: relative;
      width: 46px;
      height: 26px;
      flex-shrink: 0;
    }
    .pull-toggle-switch input { opacity: 0; width: 0; height: 0; }
    .pull-toggle-slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      transition: 0.2s;
    }
    .pull-toggle-slider::before {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: 0.2s;
    }
    .pull-toggle-switch input:checked + .pull-toggle-slider { background: #9333ea; }
    .pull-toggle-switch input:checked + .pull-toggle-slider::before { transform: translateX(20px); }

    #pullDragonsSection { display: none; margin-bottom: 14px; }
    #pullDragonsSection.open { display: block; }
    .pull-dragon-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .pull-dragon-row input[type="text"] { flex: 2; }
    .pull-dragon-row input[type="number"] { flex: 1; }
    .pull-dragon-row .btn-remove-pull {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      width: 38px;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-add-pull {
      width: 100%;
      padding: 9px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.2);
      color: #9ca3af;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.75rem;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .btn-add-pull:hover { background: rgba(255,255,255,0.08); }

    .btn-finalize {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #16a34a, #15803d);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Poppins', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-finalize:hover { opacity: 0.9; }

    .empty-cart { text-align: center; padding: 32px; color: #4b5563; font-size: 0.82rem; }
    .empty-cart i { font-size: 2rem; display: block; margin-bottom: 10px; }

    .settings-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 6px;
      display: block;
    }


    /* ── Chat flutuante ── */
    #chatToggleBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c3aed, #22d3ee);
      border: none;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(124,58,237,0.5);
      z-index: 150;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    #chatToggleBtn:hover { transform: scale(1.08); }

    #chatWindow {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 340px;
      max-width: calc(100vw - 32px);
      height: 460px;
      max-height: calc(100vh - 140px);
      background: #0d0e14;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      z-index: 150;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    #chatWindow.open { display: flex; }
    .chat-header {
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(34,211,238,0.15));
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-title { font-size: 0.82rem; font-weight: 800; color: #fff; display:flex; align-items:center; gap:8px; }
    .chat-header-title i { color: #22d3ee; }
    .chat-close { background:none; border:none; color:#9ca3af; cursor:pointer; font-size:1rem; }
    .chat-close:hover { color: #fff; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .chat-msg { max-width: 85%; padding: 9px 12px; border-radius: 12px; font-size: 0.78rem; line-height: 1.5; }
    .chat-msg.bot  { background: rgba(255,255,255,0.06); color: #e5e7eb; align-self: flex-start; border: 1px solid rgba(255,255,255,0.06); }
    .chat-msg.user { background: rgba(124,58,237,0.3); color: #fff; align-self: flex-end; }
    .chat-msg.typing { color: #6b7280; font-style: italic; }
    .chat-input-row {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .chat-input-row input {
      flex: 1;
      background: rgba(5,6,9,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      border-radius: 10px;
      padding: 9px 12px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.78rem;
      outline: none;
    }
    .chat-input-row input:focus { border-color: #22d3ee; }
    .chat-input-row button {
      background: #7c3aed;
      border: none;
      color: #fff;
      width: 38px;
      border-radius: 10px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-input-row button:hover { background: #8b5cf6; }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="header-top">
    <div class="brand">
      <img src="https://i.pinimg.com/736x/f2/65/b3/f265b35be4963f4ec67737fffdacc9f6.jpg" alt="logo">
      <span class="brand-name">MITSUGOSHI</span>
    </div>
    <div class="header-actions">
      <div style="position:relative">
        <button onclick="document.getElementById('catMenu').classList.toggle('active')"
                style="padding:8px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#22d3ee;cursor:pointer;font-size:0.8rem;transition:border 0.2s"
                onblur="setTimeout(()=>document.getElementById('catMenu').classList.remove('active'),150)">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div id="catMenu" class="glass-card"></div>
      </div>
      <button id="cartBtn" onclick="openCart()">
        <i class="fa-solid fa-shopping-bag" style="color:#22d3ee"></i>
        Carrinho (<span id="cartCount">0</span>)
      </button>
    </div>
  </div>
</header>

<!-- ── MAIN ── -->
<main>

  <!-- Ranking -->
  <div class="ranking-section">
    <div class="section-title"><i class="fa-solid fa-trophy"></i> Top 5 Dragões</div>
    <div class="ranking-grid" id="rankingContainer">
      <div class="rank-card glass-card" style="color:#4b5563;font-size:0.72rem;grid-column:1/-1;text-align:center;padding:24px">
        Nenhum dragão cadastrado ainda.
      </div>
    </div>
  </div>

  <!-- Busca -->
  <input type="text" id="searchInput" placeholder="🔍 Buscar dragão ou raridade..." oninput="applyFilters()">

  <!-- Filtro raridade -->
  <div class="filter-bar">
    <button class="filter-btn on-todos" data-f="todos"    onclick="setFilter('todos',this)">✦ Todos</button>
    <button class="filter-btn"          data-f="heroi"    onclick="setFilter('heroi',this)">👑 Heróico</button>
    <button class="filter-btn"          data-f="mitico"   onclick="setFilter('mitico',this)">💜 Mítico</button>
    <button class="filter-btn"          data-f="lendario" onclick="setFilter('lendario',this)">⭐ Lendário</button>
  </div>
  <div id="filterCount"></div>

  <!-- Catálogo -->
  <div id="itemsContainer"></div>

</main>

<!-- ── MODAL CARRINHO ── -->
<div id="checkoutModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title"><i class="fa-solid fa-shopping-bag"></i> Seu Carrinho</span>
      <button class="btn-close-modal" onclick="closeCart()"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <div id="cartList"></div>

    <div class="pull-toggle-row">
      <div>
        <div class="pull-toggle-label">🏪 Loja Puxando</div>
        <div class="pull-toggle-sub">Gasta menos essências, +R$1 a cada 100 Orbs</div>
      </div>
      <label class="pull-toggle-switch">
        <input type="checkbox" id="pullToggle" onchange="togglePullMode()">
        <span class="pull-toggle-slider"></span>
      </label>
    </div>

    <div id="pullDragonsSection">
      <label class="settings-label" style="display:block;margin-bottom:8px">Dragões que você vai dar</label>
      <div id="pullDragonsList"></div>
      <button type="button" class="btn-add-pull" onclick="addPullDragonRow()">
        <i class="fa-solid fa-plus"></i> Adicionar dragão
      </button>
    </div>

    <div id="essenceSummary"></div>
    <div id="discountSummary"></div>

    <input class="modal-input" type="text" id="nick" placeholder="Seu nick no Dragon City">
    <input class="modal-input" type="tel"  id="telefone" placeholder="Seu WhatsApp (ex: 55...)">

    <div class="bonus-row">
      <input class="modal-input" style="margin:0" type="text" id="bonusCode" placeholder="Código de desconto">
      <button class="btn-apply-bonus" onclick="renderCart()">Aplicar</button>
    </div>

    <div class="total-row">
      <span class="total-label">Total</span>
      <span id="totalDisplay">R$ 0,00</span>
    </div>

    <button class="btn-finalize" onclick="finalizeOrder()">
      <i class="fa-brands fa-whatsapp"></i> Finalizar via WhatsApp
    </button>
  </div>
</div>

<!-- ── MODAL CONFIGURAÇÕES ── -->
<!-- ── CHAT FLUTUANTE ── -->
<button id="chatToggleBtn" onclick="toggleChat()" title="Assistente Mitsugoshi">
  <i class="fa-solid fa-comment-dots"></i>
</button>

<div id="chatWindow">
  <div class="chat-header">
    <span class="chat-header-title"><i class="fa-solid fa-dragon"></i> Assistente Mitsugoshi</span>
    <button class="chat-close" onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="chat-messages" id="chatMessages"></div>
  <div class="chat-input-row" id="chatInputRow">
    <input type="text" id="chatInput" placeholder="Pergunte sobre os dragões..." onkeydown="if(event.key==='Enter')sendChatMessage()">
    <button onclick="sendChatMessage()"><i class="fa-solid fa-paper-plane"></i></button>
  </div>
</div>

<script>
  // ── Storage key (fallback local) ────────────────────────────────
  const STORAGE_KEY = 'mitsugoshi_dragons';
  const FN_GET = '/.netlify/functions/dragons-get';

  // ── Cart ──────────────────────────────────────────────────────
  let cart = [];
  let activeFilter = 'todos';
  let dragonsCache = [];
  let pullMode = false;
  let pullDragonRows = 0;

  // Quantidade de "saltos" de troca necessários para fechar 100 Orbs,
  // considerando o arredondamento por raridade (100→100, 100→102, 100→105).
  const SALTOS_POR_100_ORBS = {
    heroi: 20,    // 5 em 5 → 100/5 = 20 saltos
    mitico: 17,   // 6 em 6 → 102/6 = 17 saltos
    lendario: 15, // 7 em 7 → 105/7 = 15 saltos
  };

  // ── Load (busca do servidor via Netlify Function, fallback local) ──
  async function loadDragons() {
    try {
      const res = await fetch(FN_GET, { cache: 'no-store' });
      if (res.ok) {
        const data = await res.json();
        if (Array.isArray(data)) {
          dragonsCache = data;
          // guarda cópia local de emergência (ex: se o servidor cair)
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          return data;
        }
      }
    } catch (e) {
      console.error('Não foi possível buscar dados do servidor, usando cópia local.', e);
    }
    // Fallback: última cópia conhecida salva neste navegador
    dragonsCache = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    return dragonsCache;
  }

  // Mantido por compatibilidade com chamadas síncronas (usa o cache já carregado)
  function load() {
    return dragonsCache;
  }

  // ── Format description ────────────────────────────────────────
  function formatDesc(skills, raridade) {
    if (!skills || skills.length === 0) return '<span style="color:#4b5563;font-size:0.7rem">Sem descrição.</span>';
    const rLabel = raridade === 'heroi' ? 'heróico' : raridade === 'mitico' ? 'mítico' : 'lendário';
    const rClass = 'color-' + raridade;
    let html = `<span class="${rClass}">${rLabel}</span><br>`;
    skills.forEach(s => {
      const tipo = s.tipo === 'ativa' ? '<span class="color-ativa">habilidade ativa</span>' : '<span class="color-passiva">habilidade passiva</span>';
      html += `${tipo}: ${s.texto}<br>`;
    });
    return html;
  }

  // ── Build category menu ───────────────────────────────────────
  function buildCatMenu(dragons) {
    const cats = [...new Set(dragons.map(d => d.cat))];
    const menu = document.getElementById('catMenu');
    menu.innerHTML = cats.map(c =>
      `<a href="#cat-${CSS.escape(c)}" onclick="document.getElementById('catMenu').classList.remove('active')">${c}</a>`
    ).join('');
  }

  // ── Render ranking ────────────────────────────────────────────
  function renderRanking(dragons) {
    const container = document.getElementById('rankingContainer');
    if (dragons.length === 0) {
      container.innerHTML = `<div class="rank-card glass-card" style="color:#4b5563;font-size:0.72rem;grid-column:1/-1;text-align:center;padding:24px">Nenhum dragão cadastrado ainda.</div>`;
      return;
    }

    // Usa as posições definidas manualmente no admin (rankPos: 1 a 5).
    // Se nenhum dragão tiver posição definida, cai no fallback dos 5 primeiros cadastrados.
    const ranked = [1, 2, 3, 4, 5]
      .map(pos => dragons.find(d => d.rankPos === pos))
      .filter(Boolean);

    const top5 = ranked.length > 0 ? ranked : dragons.slice(0, 5);

    const hexColors = ['#facc15','#a78bfa','#a78bfa','#a78bfa','#a78bfa'];
    container.innerHTML = top5.map((d, i) => `
      <div class="rank-card glass-card">
        <div class="rank-num" style="color:${hexColors[i]}">#${i+1}</div>
        <img src="${d.img || 'https://placehold.co/52x52/111/333?text=?'}"
             onerror="this.src='https://placehold.co/52x52/111/333?text=?'">
        <div class="rank-name">${d.nome}</div>
      </div>
    `).join('');
  }

  // ── Filter ────────────────────────────────────────────────────
  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.className = 'filter-btn';
      if (b.dataset.f === f) b.classList.add('on-' + f);
    });
    applyFilters();
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cards = document.querySelectorAll('.dragon-card[data-id]');
    let visible = 0;

    cards.forEach(card => {
      const r    = card.dataset.raridade;
      const nome = card.dataset.nome.toLowerCase();
      const cat  = card.dataset.cat.toLowerCase();
      const skills = card.dataset.skills ? card.dataset.skills.toLowerCase() : '';

      const matchR = activeFilter === 'todos' || r === activeFilter;
      const matchQ = !q || nome.includes(q) || cat.includes(q) || r.includes(q) || skills.includes(q);

      if (matchR && matchQ) {
        card.classList.remove('hidden-by-filter');
        visible++;
      } else {
        card.classList.add('hidden-by-filter');
      }
    });

    // Esconde seções vazias
    document.querySelectorAll('.cat-section').forEach(sec => {
      const hasVisible = sec.querySelectorAll('.dragon-card:not(.hidden-by-filter)').length > 0;
      sec.classList.toggle('all-hidden', !hasVisible);
    });

    const fc = document.getElementById('filterCount');
    fc.textContent = visible === 0
      ? 'Nenhum dragão encontrado.'
      : `${visible} dragão${visible !== 1 ? 'ões' : ''} encontrado${visible !== 1 ? 's' : ''}.`;
  }

  // ── Render catalog ────────────────────────────────────────────
  async function renderCatalog() {
    const dragons = await loadDragons();
    buildCatMenu(dragons);
    renderRanking(dragons);

    const container = document.getElementById('itemsContainer');
    container.innerHTML = '';

    if (dragons.length === 0) {
      container.innerHTML = `
        <div class="empty-catalog">
          <i class="fa-solid fa-dragon"></i>
          <h3>Nenhum dragão no catálogo ainda.</h3>
          <p>Acesse o painel admin para cadastrar os primeiros dragões.</p>
          <a href="admin.html">Abrir Admin →</a>
        </div>`;
      document.getElementById('filterCount').textContent = '';
      return;
    }

    // Agrupar por categoria
    const cats = [...new Set(dragons.map(d => d.cat))];
    cats.forEach(cat => {
      const sec = document.createElement('div');
      sec.className = 'cat-section';
      sec.id = 'cat-' + cat;
      sec.innerHTML = `<h2>${cat}</h2><div class="cards-grid"></div>`;
      const grid = sec.querySelector('.cards-grid');

      dragons.filter(d => d.cat === cat).forEach(d => {
        const skillsText = (d.skills || []).map(s => s.texto).join(' ');
        const badgeClass = `badge-${d.raridade}`;
        const rLabel = d.raridade === 'heroi' ? '👑 Heróico' : d.raridade === 'mitico' ? '💜 Mítico' : '⭐ Lendário';

        const card = document.createElement('div');
        card.className = 'dragon-card glass-card';
        card.dataset.id       = d.id;
        card.dataset.raridade = d.raridade;
        card.dataset.nome     = d.nome;
        card.dataset.cat      = d.cat;
        card.dataset.skills   = skillsText;

        card.innerHTML = `
          <div class="card-img-wrap">
            <img src="${d.img || 'https://placehold.co/200x200/111/333?text=?'}"
                 onerror="this.src='https://placehold.co/200x200/111/333?text=?'"
                 alt="${d.nome}">
            <span class="card-rarity-badge ${badgeClass}">${rLabel}</span>
          </div>
          <div class="card-name">${d.nome}</div>
          <div class="card-desc">${formatDesc(d.skills, d.raridade)}</div>
          <select class="card-select" id="sel-${d.id}">
            ${[100,200,300,400,500,600,700,800,900,1000].map(o => `<option value="${o}">${o} Orbs</option>`).join('')}
          </select>
          <button class="btn-add" onclick="addToCart('${d.id}')">
            <i class="fa-solid fa-cart-plus"></i> Adicionar
          </button>
        `;
        grid.appendChild(card);
      });

      container.appendChild(sec);
    });

    applyFilters();
  }

  // ── Cart ──────────────────────────────────────────────────────
  function addToCart(id) {
    const dragons = load();
    const d = dragons.find(x => x.id === id);
    if (!d) return;
    const orbs = parseInt(document.getElementById('sel-' + id).value);
    cart.push({ ...d, orbs });
    document.getElementById('cartCount').textContent = cart.length;

    // feedback no botão
    const btn = event.target.closest('button');
    const orig = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-check"></i> Adicionado!';
    btn.style.background = '#16a34a';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 1200);
  }

  function openCart()  { renderCart(); document.getElementById('checkoutModal').classList.add('open'); }
  function closeCart() { document.getElementById('checkoutModal').classList.remove('open'); }

  // ── Cupons de revendedor (200 Orbs grátis, exige 500+ Orbs no carrinho) ──
  const CODIGOS_REVENDEDOR = ['pain007', 'rafinha200', 'angel200', 'jow200'];

  function renderCart() {
    const bonus     = document.getElementById('bonusCode').value.toLowerCase().trim();
    const list      = document.getElementById('cartList');

    if (cart.length === 0) {
      list.innerHTML = `<div class="empty-cart"><i class="fa-solid fa-shopping-basket"></i> Seu carrinho está vazio.</div>`;
      document.getElementById('totalDisplay').textContent = 'R$ 0,00';
      document.getElementById('essenceSummary').innerHTML = '';
      document.getElementById('discountSummary').innerHTML = '';
      return;
    }

    const totalOrbs = cart.reduce((acc, c) => acc + c.orbs, 0);

    // Desconto automático de 15% para 1000+ Orbs no carrinho (sem precisar de código)
    const desconto15 = totalOrbs >= 1000 ? 0.15 : 0;

    // Cupom legado "mitsugoshi" (10%) continua funcionando, mas não se acumula com o automático de 15%
    const discount = bonus === 'mitsugoshi' ? Math.max(0.1, desconto15) : desconto15;

    // Código de revendedor: 200 Orbs grátis, exige 500+ Orbs no carrinho
    const codigoValido = CODIGOS_REVENDEDOR.includes(bonus);
    const orbsGratis = (codigoValido && totalOrbs >= 500) ? 200 : 0;

    list.innerHTML = cart.map((item, i) => {
      const precoUnit = (item.preco !== undefined && item.preco !== null) ? item.preco : 3;
      const precoAjustado = pullMode ? precoUnit + 1 : precoUnit;
      const price = ((item.orbs / 100) * precoAjustado).toFixed(2);
      return `
        <div class="cart-item">
          <img src="${item.img || 'https://placehold.co/46x46/111/333?text=?'}"
               onerror="this.src='https://placehold.co/46x46/111/333?text=?'">
          <div class="cart-item-info">
            <div class="cart-item-name">${item.nome}</div>
            <div class="cart-item-orbs">${item.orbs} Orbs · ${item.cat}</div>
          </div>
          <span class="cart-item-price">R$ ${price}</span>
          <button class="btn-remove-item" onclick="removeItem(${i})"><i class="fa-solid fa-xmark"></i></button>
        </div>
      `;
    }).join('');

    const raw = cart.reduce((acc, c) => {
      const precoUnit = (c.preco !== undefined && c.preco !== null) ? c.preco : 3;
      const precoAjustado = pullMode ? precoUnit + 1 : precoUnit;
      return acc + (c.orbs / 100) * precoAjustado;
    }, 0);
    const total = raw * (1 - discount);
    document.getElementById('totalDisplay').textContent = `R$ ${total.toFixed(2)}`;

    // Resumo de benefícios aplicados
    const discountBox = document.getElementById('discountSummary');
    const beneficios = [];
    if (desconto15 > 0) beneficios.push(`🎉 15% de desconto aplicado (compra de ${totalOrbs}+ Orbs)`);
    if (bonus === 'mitsugoshi' && desconto15 === 0) beneficios.push(`🎉 10% de desconto (cupom Mitsugoshi)`);
    if (orbsGratis > 0) beneficios.push(`🎁 +${orbsGratis} Orbs grátis (cupom de revendedor)`);
    if (bonus && !codigoValido && bonus !== 'mitsugoshi') beneficios.push(`⚠️ Cupom inválido`);
    if (codigoValido && totalOrbs < 500) beneficios.push(`⚠️ Cupom válido, mas requer 500+ Orbs no carrinho`);

    discountBox.innerHTML = beneficios.length > 0
      ? beneficios.map(b => `<div class="essence-row" style="color:#4ade80">${b}</div>`).join('')
      : '';

    renderEssenceSummary();
  }

  // ── Essências (calculadas automaticamente por raridade) ────────
  function calcEssencias(item) {
    const saltos = SALTOS_POR_100_ORBS[item.raridade] || SALTOS_POR_100_ORBS.heroi;
    const custoSalto = pullMode ? 1 : 2;
    const lotes = item.orbs / 100;
    return Math.round(saltos * custoSalto * lotes);
  }

  function renderEssenceSummary() {
    const box = document.getElementById('essenceSummary');
    if (cart.length === 0) { box.innerHTML = ''; return; }

    const linhas = cart.map(item => {
      const essencias = calcEssencias(item);
      return `<div class="essence-row"><span>${item.nome} (${item.orbs} Orbs)</span><span>${essencias} essências</span></div>`;
    }).join('');

    const totalEssencias = cart.reduce((acc, item) => acc + calcEssencias(item), 0);

    box.innerHTML = `
      ${linhas}
      <div class="essence-row" style="border-top:1px solid rgba(255,255,255,0.07);margin-top:4px;padding-top:8px;font-weight:700">
        <span>Total de essências</span><span>${totalEssencias}</span>
      </div>
    `;
  }

  // ── Modo "Loja Puxando" ─────────────────────────────────────────
  function togglePullMode() {
    pullMode = document.getElementById('pullToggle').checked;
    const section = document.getElementById('pullDragonsSection');
    section.classList.toggle('open', pullMode);

    if (pullMode && document.getElementById('pullDragonsList').children.length === 0) {
      addPullDragonRow();
    }

    renderCart();
  }

  function addPullDragonRow() {
    pullDragonRows++;
    const rowId = pullDragonRows;
    const list = document.getElementById('pullDragonsList');
    const row = document.createElement('div');
    row.className = 'pull-dragon-row';
    row.id = `pullRow-${rowId}`;
    row.innerHTML = `
      <input type="text" class="modal-input" placeholder="Nome do dragão" id="pullName-${rowId}">
      <input type="number" class="modal-input" placeholder="Qtd" min="1" id="pullQty-${rowId}">
      <button type="button" class="btn-remove-pull" onclick="removePullDragonRow(${rowId})"><i class="fa-solid fa-xmark"></i></button>
    `;
    list.appendChild(row);
  }

  function removePullDragonRow(rowId) {
    const row = document.getElementById(`pullRow-${rowId}`);
    if (row) row.remove();
  }

  function getPullDragonsList() {
    const rows = document.querySelectorAll('#pullDragonsList .pull-dragon-row');
    const result = [];
    rows.forEach(row => {
      const nameInput = row.querySelector('input[type="text"]');
      const qtyInput = row.querySelector('input[type="number"]');
      const nome = nameInput?.value.trim();
      const qtd = qtyInput?.value.trim();
      if (nome) result.push({ nome, qtd: qtd || '1' });
    });
    return result;
  }

  function removeItem(i) {
    cart.splice(i, 1);
    document.getElementById('cartCount').textContent = cart.length;
    renderCart();
  }

  function finalizeOrder() {
    if (cart.length === 0) return alert('Seu carrinho está vazio!');
    const nick = document.getElementById('nick').value.trim();
    const tel  = document.getElementById('telefone').value.trim();
    const total = document.getElementById('totalDisplay').textContent;
    const bonus = document.getElementById('bonusCode').value.toLowerCase().trim();
    const totalOrbs = cart.reduce((acc, c) => acc + c.orbs, 0);

    const lines = cart.map(c => {
      const essencias = calcEssencias(c);
      return `• ${c.nome} — ${c.orbs} Orbs (${essencias} essências)`;
    }).join('\n');

    const totalEssencias = cart.reduce((acc, item) => acc + calcEssencias(item), 0);

    let beneficiosInfo = '';
    if (totalOrbs >= 1000) beneficiosInfo += `\n🎉 15% de desconto aplicado (1000+ Orbs)`;
    else if (bonus === 'mitsugoshi') beneficiosInfo += `\n🎉 10% de desconto (cupom Mitsugoshi)`;

    if (CODIGOS_REVENDEDOR.includes(bonus) && totalOrbs >= 500) {
      beneficiosInfo += `\n🎁 +200 Orbs grátis (cupom de revendedor: ${bonus})`;
    }

    let pullInfo = '';
    if (pullMode) {
      const pullDragons = getPullDragonsList();
      const pullLines = pullDragons.length > 0
        ? pullDragons.map(p => `• ${p.nome} x${p.qtd}`).join('\n')
        : '(nenhum dragão informado)';
      pullInfo = `\n\n🏪 Loja Puxando — dragões que serão dados:\n${pullLines}`;
    }

    const msg = `Olá! Quero fazer um pedido na Mitsugoshi:\n\n${lines}\n\nTotal de essências: ${totalEssencias}${beneficiosInfo}${pullInfo}\n\nTotal: ${total}\nNick: ${nick || '(não informado)'}\nWhatsApp: ${tel || '(não informado)'}`;
    window.open(`https://wa.me/5534991779656?text=${encodeURIComponent(msg)}`, '_blank');
  }

  // ── Close modal on backdrop ───────────────────────────────────
  document.getElementById('checkoutModal').addEventListener('click', function(e) {
    if (e.target === this) closeCart();
  });

  // ── Chat flutuante (Groq via proxy seguro) ──────────────────────
  let chatHistory = [];
  let chatOpened = false;
  const FN_CHAT = '/.netlify/functions/groq-chat';

  function toggleChat() {
    const win = document.getElementById('chatWindow');
    win.classList.toggle('open');
    if (win.classList.contains('open') && !chatOpened) {
      chatOpened = true;
      initChatUI();
    }
  }

  function initChatUI() {
    const messages = document.getElementById('chatMessages');
    messages.innerHTML = '';
    addChatMessage('bot', 'Olá! 🐉 Sou o assistente da Mitsugoshi. Me conte o que você procura (ex: "quero um dragão mítico com habilidade de cura") e eu recomendo as melhores opções do nosso catálogo!');
  }

  function addChatMessage(role, text) {
    const messages = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'chat-msg ' + role;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function buildCatalogSummary() {
    if (!dragonsCache || dragonsCache.length === 0) return 'O catálogo está vazio no momento.';
    return dragonsCache.map(d => {
      const skills = (d.skills || []).map(s => `${s.tipo}: ${s.texto}`).join(' | ') || 'sem habilidades cadastradas';
      return `- ${d.nome} | Família: ${d.cat} | Raridade: ${d.raridade} | Habilidades: ${skills}`;
    }).join('\n');
  }

  async function sendChatMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    addChatMessage('user', text);
    chatHistory.push({ role: 'user', content: text });

    const typing = addChatMessage('bot typing', 'Digitando...');

    try {
      const res = await fetch(FN_CHAT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: chatHistory,
          catalogSummary: buildCatalogSummary(),
        }),
      });

      const data = await res.json();
      typing.remove();

      if (!res.ok) {
        addChatMessage('bot', 'O assistente está indisponível agora. Tente novamente em alguns instantes.');
        console.error('Erro do proxy de chat:', data);
        return;
      }

      const reply = data.reply || 'Desculpe, não consegui gerar uma resposta agora.';
      addChatMessage('bot', reply);
      chatHistory.push({ role: 'assistant', content: reply });

    } catch (e) {
      typing.remove();
      addChatMessage('bot', 'Erro de conexão com a IA. Tente novamente em alguns instantes.');
      console.error(e);
    }
  }

  // ── Init ──────────────────────────────────────────────────────
  renderCatalog();

  // Verifica periodicamente se o admin atualizou o catálogo no servidor
  setInterval(renderCatalog, 30000);
</script>
</body>
</html>
